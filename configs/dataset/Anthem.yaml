# configs/dataset/Anthem.yaml
params:
    model_count: 5
    base_model_count: 1
    max_len_hla: 34
    max_len_pep: 15
    fusion:
    predictor:

train:
  name: "Anthem_train"
  epochs: 1000

  loss_delta: 1e-4
  # 0.3
  dropout : 0.2
  # 1024
  batch_size: 1024
  grad_clip: 0.5

  # optimizer
  start_lr: 1e-3
  # 1e-5
  weight_decay: 1e-5

  # scheduler 4
  scheduler_patience: 8
  cooldown: 4
  min_lr: 1e-6
  # 0.2
  scheduler_factor: 0.2

  # early_stop
  callback_patience: 10
  # ModelCheckPoint
  period: 1

model:










